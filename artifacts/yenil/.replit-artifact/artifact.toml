kind = "web"
previewPath = "/"
title = "Ýeňil"
version = "1.0.0"
id = "artifacts/yenil"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21053

[services.development]
run = "pnpm --filter @workspace/yenil run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/yenil", "run", "build" ]
publicDir = "artifacts/yenil/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21053"
BASE_PATH = "/"
